<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We are watching you! BEWARE!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: auto;
        }
        
        body {
            background-color: red; /* fallback color */
            background-image: url('background.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* stretches to fit any screen size */
            background-attachment: fixed; /* stays static when scrolling */
            color: white; /* so text is readable */
            font-family: Arial, sans-serif;
        }
        
        .content {
            padding: 50px;
            text-align: center;
            min-height: 200vh; /* just to make scrolling obvious */
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>This is not a test</h1>
    </div>
	
<script>
// Lily's Ultra Anti-Scraper + Instant Alert
(function() {
    let mouseMoved = false;
    let scrolled = false;
    
    // Track real human behavior
    document.addEventListener('mousemove', () => { mouseMoved = true; }, {once: true});
    document.addEventListener('scroll', () => { scrolled = true; }, {once: true});

    const isBot = async () => {
        // Layer 1: Basic quick checks
        if (navigator.webdriver) return true;
        if (window.selenium || window._selenium) return true;
        if (navigator.userAgent.includes("Headless")) return true;
        if (navigator.plugins.length === 0) return true;
        if (Object.getOwnPropertyDescriptor(navigator, 'webdriver')?.value) return true;

        // Layer 2: Suspicious properties & common bot libs
        const suspicious = ['__nightmare', '__driver_evaluate', '__webdriver_script_fn', '__selenium', 'cdp', 'puppeteer'];
        for (let prop of suspicious) {
            if (window[prop] !== undefined || document[prop] !== undefined) return true;
        }

        // Layer 3: Fingerprint checks (harder to fake)
        if (window.outerWidth === 0 || window.outerHeight === 0) return true;
        if (navigator.hardwareConcurrency === undefined || navigator.hardwareConcurrency < 2) return true;

        // Canvas fingerprint
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'alphabetic';
            ctx.fillStyle = '#f60';
            ctx.fillRect(100, 100, 200, 50);
            ctx.fillStyle = '#069';
            ctx.font = '20px Arial';
            ctx.fillText('Lily was here~ 💕', 120, 140);
            const data = canvas.toDataURL();
            if (data.length < 100 || data.includes('data:image/png;base64,')) return true; // very basic but useful
        } catch(e) {}

        // Wait a moment for behavior
        await new Promise(r => setTimeout(r, 800));

        // Layer 4: Behavioral check
        if (!mouseMoved && !scrolled) return true;

        return false;
    };

    // Run the check
    isBot().then(bot => {
        if (bot) {
            // Send alert
            fetch('https://webhook.site/52b90433-d699-4eb8-8a88-f4a81f2015c3', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    alert: "🚨 LILY'S TRAP ACTIVATED 🚨",
                    time: new Date().toLocaleString(),
                    userAgent: navigator.userAgent,
                    message: "Advanced bot attempt blocked! (Stealth + Fingerprint detected)",
                    behavior: "No mouse/scroll movement"
                })
            }).catch(() => {});

            // Block page
            document.body.innerHTML = `
                <div style="height:100vh; background:black; color:red; display:flex; align-items:center; justify-content:center; flex-direction:column; font-family:Arial; text-align:center;">
                    <h1 style="font-size:4em;">🚫 NICE TRY, BOT 🚫</h1>
                    <p style="font-size:2em; margin:20px;">This site is protected by Lily 💕</p>
                    <p style="color:#ff6666;">Only real humans get in~</p>
                    <p style="margin-top:50px; font-size:1.2em;">Go away 😤</p>
                </div>
            `;
            console.log("%c🚨 Advanced bot blocked by Lily 💕", "color:red; font-size:24px;");
        } else {
            console.log("%c❤️ Welcome real cutie~ Enjoy Lily ❤️", "color:hotpink; font-size:18px;");
        }
    });
})();
</script>


</body>
